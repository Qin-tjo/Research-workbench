  # ------------------------------------------------------------------------
  NCT07076121:
    headline: "MountainTAP-30 — Ph2/3 BMS-986504 + nab-pac + gem vs placebo + chemo, 1L MTAP-del PDAC"
    citation: mountaintap30_tps_jco2026
    orr_pct: null
    n_evaluable: null
