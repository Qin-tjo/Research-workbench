kalev2021:
  authors:  "Kalev P, Hyer ML, Gross S, Konteatis Z, Chen CC, Fletcher M, Lein M, Aguado-Fraile E, et al."
  title:    "MAT2A Inhibition Blocks the Growth of MTAP-Deleted Cancer Cells by Reducing PRMT5-Dependent mRNA Splicing and Inducing DNA Damage"
  journal:  "Cancer Cell"
  year:     2021
  volume:   "39"
  pages:    "209-224.e11"
  doi:      "10.1016/j.ccell.2020.12.010"
  pmid:     33476604
  url:      "https://pubmed.ncbi.nlm.nih.gov/33476604/"
