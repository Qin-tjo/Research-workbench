# -------- Companion-diagnostic / detection-method comparisons --------------

brune2026_mtap_ihc:
  authors:  "Brune MM, Joerger M, Demarrer M, Savic-Prince S, Quagliata L, Hofman P, Bubendorf L, et al."
  title:    "MTAP Expression by Immunohistochemistry: A Novel Biomarker in NSCLC"
  journal:  "Journal of Thoracic Oncology"
  year:     2026
  volume:   "21"
  pages:    "112-123"
  doi:      "10.1016/j.jtho.2025.08.014"
  pmid:     40850616
  url:      "https://pubmed.ncbi.nlm.nih.gov/40850616/"
  note:     "Head-to-head MTAP IHC vs NGS in NSCLC. IHC identified MTAP deficiency in 18.2% of cases — substantially higher than ~6% reported by OPA-NGS in matched cohorts. Attributed to MTAP not having dedicated probe coverage in the panel tested.  Also: only 28.4% of MTAP-deficient NSCLC showed CDKN2A loss on NGS, and 72.9% of CDKN2A-loss NSCLC in TCGA had concurrent MTAP loss — undermining CDKN2A as a clean surrogate."

febres_aldana_2024_mtap_meso:
  authors:  "Febres-Aldana CA, Chang JC, Jungbluth AA, Adusumilli PS, Bodd FM, Frosina D, Geronimo JA, Hernandez E, Irawan H, Offin MD, Rekhtman N, Travis WD, Vanderbilt C, Zauderer MG, Zhang Y, Ladanyi M, Yang SR, Sauter JL."
  title:    "Comparison of Immunohistochemistry, Next-generation Sequencing and Fluorescence In Situ Hybridization for Detection of MTAP Loss in Pleural Mesothelioma"
  journal:  "Modern Pathology"
  year:     2024
  volume:   "37"
  pages:    "100420"
  doi:      "10.1016/j.modpat.2023.100420"
  pmid:     null
  url:      "https://doi.org/10.1016/j.modpat.2023.100420"
  note:     "MSK head-to-head study comparing MTAP IHC, NGS-based CN calls and FISH for detection of 9p21 / MTAP loss in 122 pleural mesotheliomas. IHC reported as more sensitive than panel-NGS for MTAP loss detection; FISH used as gold standard. Discrepancies attributed largely to low tumour purity and to NGS calling limitations with focal deletions."

