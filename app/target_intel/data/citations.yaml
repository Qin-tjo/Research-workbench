# Citation database for the Target Intelligence dashboard.
# Every claim that appears in any panel must trace to a citation key here.
# Keys are short, all-lowercase, FirstAuthorLastNameYear, with a letter suffix
# only if needed for disambiguation.
#
# Each entry includes a stable URL (PubMed preferred; DOI when PubMed n/a)
# for embedding in the final HTML.

# =============================================================================
# Foundational mechanism — MTAP/PRMT5 synthetic-lethality "trilogy" (Jan 2016)
# =============================================================================

kryukov2016:
  authors:  "Kryukov GV, Wilson FH, Ruth JR, Riggi G, Adamopoulos P, Murphy DJ, Walker EJ, Whittaker JW, Watson JS, et al."
  title:    "MTAP deletion confers enhanced dependency on the PRMT5 arginine methyltransferase in cancer cells"
  journal:  "Science"
  year:     2016
  volume:   "351"
  pages:    "1214-1218"
  doi:      "10.1126/science.aad5214"
  pmid:     26912360
  url:      "https://pubmed.ncbi.nlm.nih.gov/26912360/"
  note:     "Genome-scale CRISPR screen identifies MTAP-loss → PRMT5 dependency; demonstrates MTA accumulation and partial PRMT5 inhibition."

mavrakis2016:
  authors:  "Mavrakis KJ, McDonald ER 3rd, Schlabach MR, Billy E, Hoffman GR, deWeck A, Ruddy DA, Venkatesan K, Yu J, et al."
  title:    "Disordered methionine metabolism in MTAP/CDKN2A-deleted cancers leads to dependence on PRMT5"
  journal:  "Science"
  year:     2016
  volume:   "351"
  pages:    "1208-1213"
  doi:      "10.1126/science.aad5944"
  pmid:     26912361
  url:      "https://pubmed.ncbi.nlm.nih.gov/26912361/"
  note:     "Parallel discovery via RNAi screen; quantifies MTA accumulation in MTAP-null cells and links to PRMT5 substrate specificity."

marjon2016:
  authors:  "Marjon K, Cameron MJ, Quang P, Clasquin MF, Mandley E, Kunii K, McVay M, Choe S, Kernytsky A, et al."
  title:    "MTAP Deletions in Cancer Create Vulnerability to Targeting of the MAT2A/PRMT5/RIOK1 Axis"
  journal:  "Cell Reports"
  year:     2016
  volume:   "15"
  pages:    "574-587"
  doi:      "10.1016/j.celrep.2016.03.043"
  pmid:     27068473
  url:      "https://pubmed.ncbi.nlm.nih.gov/27068473/"
  note:     "Extends the synthetic lethality to MAT2A (upstream SAM producer) and RIOK1 (PRMT5 downstream effector); defines the targetable axis."

